services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./ai/weights:/app/ai/weights
    environment:
      - STORAGE_DIR=/app/storage
      - SAM2_CHECKPOINT=/app/ai/weights/sam2.1_hiera_small.pt
      - SAM2_CONFIG=configs/sam2.1/sam2.1_hiera_s.yaml
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
